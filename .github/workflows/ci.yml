name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Grant minimal permissions by default
permissions:
  contents: read

jobs:
  check:
    name: Check and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@8830571d6510d05e74c37a956ac9da0e677a3aa3 # v5.1.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install just
        uses: extractions/setup-just@dd357da8c196996d2d9b5e602ef543a01691303a # v2.0.2

      - name: Run checks
        run: just check
